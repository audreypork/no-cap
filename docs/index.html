<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capy</title>
<meta name="description" content="A capybara that naps in the corner of your Mac — until you skip your tasks." />
<link rel="icon" type="image/png" href="icon.png" />
<meta property="og:title" content="Capy — 3 tasks. 1 capybara." />
<meta property="og:description" content="A capybara that naps in the corner of your Mac — until you skip your tasks. How politely he reminds you is up to you." />
<meta property="og:image" content="https://getcapy.lol/icon.png" />
<meta property="og:url" content="https://getcapy.lol" />
<meta name="twitter:card" content="summary" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Silkscreen:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --page: #ECE4D7;
    --panel: #FBF6EF;
    --ink: #463B2D;
    --outline: #4A3526;
    --label: #A89C8D;
    --shadow:
      0px 1px 1px rgba(70, 59, 45, 0.06),
      0px 10px 15px rgba(70, 59, 45, 0.10),
      0px 28px 28px rgba(70, 59, 45, 0.08);
    --pixel: "Jersey 15", monospace;
    --pixelcaps: "Silkscreen", monospace;
    --mono: "IBM Plex Mono", monospace;
    --sans: "DM Sans", -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: var(--page);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--ink); color: var(--panel); }

  .logo {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    font-family: var(--pixel); font-size: 30px; letter-spacing: 1px;
    color: var(--ink); text-decoration: none; z-index: 10;
  }

  .hero {
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 24px 24px 26vh;
    position: relative; z-index: 2;
  }
  h1 {
    font-family: var(--pixel); font-weight: 400;
    font-size: clamp(64px, 11vw, 118px);
    letter-spacing: 0.5px; line-height: 0.92;
    margin-bottom: 26px;
  }
  .sub {
    font-size: 17px; line-height: 1.6; letter-spacing: -0.2px;
    opacity: 0.75; max-width: 46ch;
    margin-bottom: 38px;
  }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 11px;
    background: var(--ink); color: var(--panel);
    font-family: var(--sans); font-weight: 600; font-size: 16px;
    letter-spacing: -0.2px;
    padding: 15px 26px; border-radius: 13px;
    text-decoration: none; cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s ease;
  }
  .dl-btn:hover { transform: translateY(-1px); }
  .dl-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

  /* ===== floating to-do panel, centered ===== */
  .float-panel {
    position: fixed; left: 50%; bottom: 2vh;
    z-index: 3;
    animation: raft 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes raft {
    0%, 100% { transform: translateX(-50%) rotate(-1deg) translateY(0); }
    50% { transform: translateX(-50%) rotate(-0.4deg) translateY(-6px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .float-panel { animation: none; transform: translateX(-50%) rotate(-1deg); }
  }
  .panel {
    width: 312px;
    background: var(--panel);
    border-radius: 18px;
    padding: 18px 18px 16px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .head-row { display: flex; align-items: center; }
  .date {
    font-family: var(--pixelcaps); font-weight: 400;
    font-size: 16px; letter-spacing: 0.5px;
    margin-left: 10px;
  }
  .chev-next { margin-left: 12px; }
  .head-spacer { flex: 1; }
  .band {
    background: #F0EAE0; border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .band-label {
    font-family: var(--mono); font-weight: 500;
    font-size: 11.5px; letter-spacing: 1.8px; text-transform: uppercase;
    color: var(--label);
  }
  .time-val {
    font-family: var(--mono); font-weight: 500;
    font-size: 17px; letter-spacing: -0.2px;
  }
  .priority { display: flex; align-items: center; gap: 10px; padding: 7px 0 7px 8px; }
  .check {
    width: 15px; height: 15px; border-radius: 3.5px;
    border: 1px solid #B5A893; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .check.done { background: var(--ink); border-color: var(--ink); }
  .p-text { font-size: 16px; letter-spacing: -0.45px; line-height: 21px; }
  .p-text.done { color: var(--label); text-decoration: line-through; text-decoration-thickness: 1.5px; }
  .raft-ripples { display: block; margin: 8px auto 0; }

  @media (max-height: 740px) {
    .float-panel { transform: translateX(-50%) scale(0.88); transform-origin: bottom center; }
  }
  @media (max-width: 720px) { .float-panel { display: none; } }

  /* ===== pond scene ===== */
  .pond {
    position: fixed; bottom: 0; left: 0;
    width: 100vw; height: 38vh; min-height: 240px;
    z-index: 1; pointer-events: none;
  }
  .pond svg { width: 100%; height: 100%; display: block; }
  .steam { animation: drift 6s ease-in-out infinite; }
  .steam.s2 { animation-delay: -2s; }
  .steam.s3 { animation-delay: -4s; }
  @keyframes drift {
    0%, 100% { transform: translateY(0); opacity: .5; }
    50% { transform: translateY(-10px); opacity: .9; }
  }
  .yuzu-bob { animation: bob 3.4s ease-in-out infinite; }
  .yuzu-bob.y2 { animation-delay: -1.2s; }
  .yuzu-bob.y3 { animation-delay: -2.3s; }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(3deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .steam, .yuzu-bob { animation: none; }
  }
</style>
</head>
<body>

<a class="logo" href="#">CAPY</a>

<main class="hero">
  <h1>3 tasks.<br>1 capybara.</h1>
  <p class="sub">Capy naps in the bottom corner quietly if you get all your work done. How politely, is up to you.</p>
  <a class="dl-btn" href="https://github.com/audreypork/no-cap/releases/latest/download/Capy.zip">
    <svg width="18" height="21" viewBox="0 0 18 21" fill="currentColor" aria-hidden="true">

      <path d="M12.15 3.99c.67-.81 1.12-1.93.99-3.05-.96.04-2.13.64-2.82 1.45-.62.72-1.16 1.86-1.02 2.96 1.08.08 2.18-.55 2.85-1.36z"/>
    </svg>
    Download for Mac
  </a>
</main>

  </svg>
</div>
